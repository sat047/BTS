version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: fee-manager-backend
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      FIREBASE_SERVICE_ACCOUNT_PATH: /app/server/firebase/serviceAccountKey.json
      FRONTEND_URL: http://localhost:3000
    volumes:
      - ./server/firebase/serviceAccountKey.json:/app/server/firebase/serviceAccountKey.json:ro
    networks:
      - fee-manager-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: .
      dockerfile: client/Dockerfile
    container_name: fee-manager-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - fee-manager-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  fee-manager-network:
    driver: bridge

volumes:
  firebase-config:
    driver: local
